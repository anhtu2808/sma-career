services:
  sma-career:
    image: anhtu2808/sma-career:latest
    container_name: sma-career
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "3005:3000"
    networks:
      - sma-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

networks:
  sma-network:
    driver: bridge
